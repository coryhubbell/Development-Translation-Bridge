version: 2
updates:
  # Composer (PHP dependencies)
  - package-ecosystem: "composer"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      php-test-tooling:
        patterns:
          - "brain/monkey"
          - "mockery/mockery"
          - "phpunit/phpunit"
      wordpress-compatibility:
        patterns:
          - "php-stubs/wordpress-stubs"
    labels:
      - "dependencies"
      - "php"

  # npm (Admin React app dependencies)
  - package-ecosystem: "npm"
    directory: "/admin"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      admin-toolchain:
        patterns:
          - "@eslint/js"
          - "@tailwindcss/postcss"
          - "@vitejs/*"
          - "autoprefixer"
          - "eslint"
          - "eslint-*"
          - "globals"
          - "postcss"
          - "tailwindcss"
          - "typescript"
          - "typescript-eslint"
          - "vite"
      admin-react-runtime:
        patterns:
          - "@types/react"
          - "@types/react-dom"
          - "react"
          - "react-dom"
          - "zustand"
      admin-runtime:
        patterns:
          - "@monaco-editor/react"
          - "@tanstack/react-query"
          - "allotment"
          - "axios"
          - "framer-motion"
          - "monaco-editor"
    labels:
      - "dependencies"
      - "javascript"

  # Python package and dev tooling
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      python-tooling:
        patterns:
          - "build"
          - "pytest*"
          - "ruff"
          - "twine"
    labels:
      - "dependencies"
      - "python"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    groups:
      ci-actions:
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "ci"

  # Docker Compose local development stack
  - package-ecosystem: "docker-compose"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    groups:
      local-dev-containers:
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "docker"
